services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ledger_data:/app/data
      - ./python/tasks:/app/python/tasks
    environment:
      - ATTENTION_LEDGER_DB_PATH=/app/data/ledger.db
      - ATTENTION_LEDGER_TASKS_DIR=/app/python/tasks
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  ledger_data:
