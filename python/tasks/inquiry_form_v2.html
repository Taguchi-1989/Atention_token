<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Support</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7fa;
        margin: 0;
        padding: 2rem 1rem;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
      }
      .card {
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 2px 12px rgba(0,0,0,.08);
        padding: 2rem;
        width: 100%;
        max-width: 520px;
      }
      h1 { font-size: 1.4rem; margin: 0 0 0.35rem; color: #111; }
      .subtitle { color: #666; font-size: 0.9rem; margin: 0 0 1.75rem; }
      .field { margin-bottom: 1.2rem; }
      label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        color: #333;
        margin-bottom: 0.35rem;
      }
      input[type="text"],
      input[type="email"],
      select,
      textarea {
        width: 100%;
        padding: 0.55rem 0.75rem;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 0.95rem;
        color: #111;
        background: #fff;
        transition: border-color 0.15s;
        font-family: inherit;
      }
      input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37,99,235,.15);
      }
      textarea { height: 120px; resize: vertical; }
      button[type="submit"] {
        width: 100%;
        padding: 0.7rem;
        background: #2563eb;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        margin-top: 0.5rem;
        transition: background 0.15s;
      }
      button[type="submit"]:hover { background: #1d4ed8; }
      #success_msg {
        display: none;
        padding: 1rem;
        background: #ecfdf5;
        border: 1px solid #6ee7b7;
        border-radius: 6px;
        color: #065f46;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Contact Support</h1>
      <p class="subtitle">Describe your issue and we will reply within 1 business day.</p>

      <form id="inquiry_form" novalidate>
        <div class="field">
          <label for="user_name">Your Name</label>
          <input
            type="text"
            id="user_name"
            name="user_name"
            placeholder="Test User"
            value="Test User"
            required
            autocomplete="name"
          />
        </div>

        <div class="field">
          <label for="user_email">Email Address</label>
          <input
            type="email"
            id="user_email"
            name="user_email"
            placeholder="you@example.com"
            value="test@example.com"
            required
            autocomplete="email"
          />
        </div>

        <div class="field">
          <label for="category">Category</label>
          <select id="category" name="category" required>
            <option value="">Select a category…</option>
            <option value="Technical Support" selected>Technical Support</option>
            <option value="Billing">Billing</option>
            <option value="Account">Account</option>
            <option value="Feature Request">Feature Request</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="field">
          <label for="message">Message</label>
          <textarea
            id="message"
            name="message"
            placeholder="Describe your issue…"
            required
          >Login fails with error code 503.</textarea>
        </div>

        <button type="submit" id="submit_btn">Send Message</button>
      </form>

      <div id="success_msg" role="alert">
        Your message has been sent. We will reply to <strong id="confirm_email"></strong> within 1 business day.
      </div>
    </div>

    <script>
      document.getElementById('inquiry_form').addEventListener('submit', function (e) {
        e.preventDefault();
        var email = document.getElementById('user_email').value;
        document.getElementById('confirm_email').textContent = email;
        this.style.display = 'none';
        document.getElementById('success_msg').style.display = 'block';
      });
    </script>
  </body>
</html>
