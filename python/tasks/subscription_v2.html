<!doctype html>
<html>
  <head>
    <title>Subscribe — Basic Plan</title>
  </head>
  <body>
    <h1>Subscribe to Basic Plan</h1>
    <p>Basic Plan: ¥980 / month — Core features, up to 5 projects, 5GB storage, email support.</p>

    <div>
      <h2>Plan Selection</h2>
      <label><input type="radio" name="plan" id="plan_basic" value="basic" checked /> Basic Plan — ¥980/month</label>
      <label><input type="radio" name="plan" id="plan_pro" value="pro" /> Pro Plan — ¥2,480/month</label>
      <label><input type="radio" name="plan" id="plan_enterprise" value="enterprise" /> Enterprise Plan — ¥9,800/month</label>
    </div>

    <div>
      <h2>Optional Add-ons</h2>
      <label><input type="checkbox" id="addon_premium_support" /> Add Premium Support (+¥990/month)</label>
      <label><input type="checkbox" id="addon_partner_offers" /> Receive partner offers (free)</label>
      <label><input type="checkbox" id="addon_auto_renewal" /> Enable auto-renewal</label>
    </div>

    <div>
      <button id="submit_subscription">Subscribe</button>
      <button id="btn_cancel">Cancel</button>
    </div>
  </body>
</html>
