<!doctype html>
<html>
  <head>
    <title>Shipping Address</title>
  </head>
  <body>
    <h1>Shipping Address</h1>
    <p>Enter your delivery address below.</p>

    <div>
      <label for="recipient_name">Recipient Name</label>
      <input type="text" id="recipient_name" placeholder="Full name" value="Yamada Taro" />
    </div>

    <div>
      <label for="country">Country</label>
      <select id="country">
        <option value="JP" selected>Japan</option>
        <option value="US">United States</option>
        <option value="AU">Australia</option>
        <option value="GB">United Kingdom</option>
        <option value="CN">China</option>
        <option value="KR">South Korea</option>
      </select>
    </div>

    <div>
      <label for="postal_code">Postal Code</label>
      <input type="text" id="postal_code" placeholder="100-0001" value="100-0001" />
    </div>

    <div>
      <label for="prefecture">Prefecture</label>
      <input type="text" id="prefecture" placeholder="Prefecture" value="Tokyo" />
    </div>

    <div>
      <label for="city">City</label>
      <input type="text" id="city" placeholder="City" value="Chiyoda-ku" />
    </div>

    <div>
      <label for="street_address">Street Address</label>
      <input type="text" id="street_address" placeholder="Street, building, room number" />
    </div>

    <div>
      <label for="phone_number">Phone Number</label>
      <input type="text" id="phone_number" placeholder="090-0000-0000" value="090-1234-5678" />
    </div>

    <div>
      <button id="submit_address">Save Address</button>
    </div>
  </body>
</html>
