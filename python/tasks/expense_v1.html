<!doctype html>
<html>
  <head>
    <title>Expense Reimbursement</title>
  </head>
  <body>
    <h1>Travel Expense Claim Form</h1>
    <p>Please enter your travel details below.</p>

    <div class="form-group">
      <label for="date">Date (YYYY-MM-DD):</label>
      <input type="text" id="date" placeholder="2024-01-01" />
    </div>

    <div class="form-group">
      <label for="route">Route (From - To):</label>
      <input type="text" id="route" placeholder="Tokyo - Osaka" />
    </div>

    <div class="form-group">
      <label for="amount">Amount (JPY):</label>
      <input type="number" id="amount" placeholder="1000" />
    </div>

    <div class="form-actions">
      <button id="submit_btn">Submit Claim</button>
    </div>
  </body>
</html>
