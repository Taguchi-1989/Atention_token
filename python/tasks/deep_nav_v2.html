<!doctype html>
<html>
  <head>
    <title>Notification Preferences</title>
  </head>
  <body>
    <h1>Notification Preferences</h1>
    <p>Choose which email notifications you want to receive.</p>

    <div>
      <h2>Email Notifications</h2>
      <label><input type="checkbox" id="notif_login" checked /> Login alerts</label>
      <label><input type="checkbox" id="notif_product_news" /> Product news and announcements</label>
      <label><input type="checkbox" id="notif_feature_updates" /> Feature updates</label>
      <label><input type="checkbox" id="notif_tips" /> Tips and best practices</label>
      <label><input type="checkbox" id="notif_surveys" /> Surveys and feedback requests</label>
    </div>

    <div>
      <h2>Email Frequency</h2>
      <label><input type="radio" name="email_freq" id="freq_instant" /> Instant</label>
      <label><input type="radio" name="email_freq" id="freq_daily" /> Daily digest</label>
      <label><input type="radio" name="email_freq" id="freq_weekly" checked /> Weekly digest</label>
      <label><input type="radio" name="email_freq" id="freq_none" /> Disable all</label>
    </div>

    <div>
      <button id="submit_preferences">Save Preferences</button>
    </div>
  </body>
</html>
